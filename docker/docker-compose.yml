version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: car-sales-mysql
    environment:
      MYSQL_ROOT_PASSWORD: Anh271020k5
      MYSQL_DATABASE: car_sales_db
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - car-sales-network

  redis:
    image: redis:7-alpine
    container_name: car-sales-redis
    ports:
      - "6379:6379"
    networks:
      - car-sales-network

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: car-sales-app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: jdbc:mysql://mysql:3306/car_sales_db
      DATABASE_USERNAME: root
      DATABASE_PASSWORD: root
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - mysql
      - redis
    networks:
      - car-sales-network

volumes:
  mysql-data:

networks:
  car-sales-network:
    driver: bridge
